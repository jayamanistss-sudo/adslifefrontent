name: Deploy Frontend
 
on:
  push:
    branches: [dev, test, prod]
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
 
      - name: Install & Build
        run: npm ci && npm run build
 
      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "prod" ]; then
            echo "path=/var/www/adslife-frontend" >> $GITHUB_OUTPUT
            echo "env=PRODUCTION (adslife.in)" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "test" ]; then
            echo "path=/var/www/adslife-frontend-test" >> $GITHUB_OUTPUT
            echo "env=TEST (test.adslife.in)" >> $GITHUB_OUTPUT
          else
            echo "path=/var/www/adslife-frontend-dev" >> $GITHUB_OUTPUT
            echo "env=DEV (dev.adslife.in)" >> $GITHUB_OUTPUT
          fi
 
      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SERVER_IP }}
          username: ${{ secrets.DEPLOY_SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "dist/*"
          target: "${{ steps.target.outputs.path }}"
          strip_components: 1
 
      - name: Notify
        run: echo "✅ Deployed to ${{ steps.target.outputs.env }} from branch ${{ github.ref_name }}"
 