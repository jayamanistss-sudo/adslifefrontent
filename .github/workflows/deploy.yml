name: Deploy Frontend

on:
  push:
    branches: [dev, test, prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set deploy config
        id: cfg
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "prod" ]; then
            echo "path=/var/www/adslife-frontend" >> $GITHUB_OUTPUT
            echo "mode=production" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "test" ]; then
            echo "path=/var/www/adslife-frontend-test" >> $GITHUB_OUTPUT
            echo "mode=test" >> $GITHUB_OUTPUT
          else
            echo "path=/var/www/adslife-frontend-dev" >> $GITHUB_OUTPUT
            echo "mode=dev" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --mode ${{ steps.cfg.outputs.mode }}

      - name: Deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SERVER_IP }}
          username: ${{ secrets.DEPLOY_SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "dist/*"
          target: ${{ steps.cfg.outputs.path }}
          strip_components: 1

      - name: Done
        run: echo "Deployed branch ${{ github.ref_name }} to ${{ steps.cfg.outputs.path }}"
