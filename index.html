<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6200" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Primary Meta -->
    <title>AdsLife - Discover Local Offers & Deals | Earn Rewards</title>
    <meta name="title" content="AdsLife - Discover Local Offers & Deals | Earn Rewards" />
    <meta name="description" content="AdsLife is India's hyperlocal offer discovery platform. Find exclusive deals from local vendors, earn coins, climb the leaderboard, and win rewards. Download AdsLife today." />
    <meta name="keywords" content="AdsLife, adslife.in, local deals India, nearby offers, discount coupons, earn rewards India, cashback deals, offers near me, flash sales, redeem coupons, loyalty rewards app, best deals today, hyperlocal deals, local vendors, AdsLife app, adslife deals, discover earn win" />
    <meta name="author" content="AdsLife" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="google-site-verification" content="6ae2bb64b781696a" />
    <meta name="google-site-verification" content="5Uxf9rCD6EnI1WvzxTXtX8Fssqec6kAbG1koT5b-TXQ" />
    <link rel="canonical" href="https://adslife.in/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AdsLife" />
    <meta property="og:url" content="https://adslife.in/" />
    <meta property="og:title" content="AdsLife - Discover Local Offers & Deals | Earn Rewards" />
    <meta property="og:description" content="India's hyperlocal offer discovery platform. Find exclusive deals, earn coins, and win rewards on AdsLife." />
    <meta property="og:image" content="https://adslife.in/adslife-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@adslife_in" />
    <meta name="twitter:title" content="AdsLife - Discover Local Offers & Deals" />
    <meta name="twitter:description" content="India's hyperlocal offer discovery platform. Find exclusive deals, earn coins, and win rewards." />
    <meta name="twitter:image" content="https://adslife.in/adslife-og.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/adslife-logo.svg" />
    <link rel="apple-touch-icon" href="/adslife-logo.svg" />

    <!-- JSON-LD Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AdsLife",
      "alternateName": "AdsLife India",
      "url": "https://adslife.in",
      "logo": "https://adslife.in/adslife-logo.svg",
      "description": "India's hyperlocal offer discovery platform. Find exclusive deals from local vendors, earn coins, and win rewards.",
      "sameAs": [
        "https://adslife.in"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@adslife.in",
        "contactType": "customer support",
        "availableLanguage": ["English", "Tamil"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      }
    }
    </script>

    <!-- JSON-LD — WebSite with SearchAction (enables Google Sitelinks Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AdsLife",
      "url": "https://adslife.in",
      "description": "Discover local deals, earn coins, and win rewards on AdsLife.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://adslife.in/feed?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD — SoftwareApplication (shows ratings/installs in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AdsLife",
      "url": "https://adslife.in",
      "applicationCategory": "ShoppingApplication",
      "operatingSystem": "Web, Android, iOS",
      "description": "Discover local deals, earn coins and rewards on India's hyperlocal offer discovery platform.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "120"
      }
    }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://adslife.in" />
    <link rel="dns-prefetch" href="https://adslife.in" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
